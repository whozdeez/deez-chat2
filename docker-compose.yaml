services:
  postgres:
    image: postgres:16
    container_name: deez-chat-db
    environment:
      - POSTGRES_USER=deez
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=deezchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: